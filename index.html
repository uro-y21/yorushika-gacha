<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヨルシカ図鑑ガチャ</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111111">

</head>
<body>

<div class="container">

<header>
    <h1>ヨルシカ曲名ガチャ</h1>
    <p class="subtitle">
        毎日単発×20回。全曲同確率。
    </p>
</header>
    
<section class="player-section">
<div id="playerInfo"></div>
    <input
        type="text"
        id="playerName"
        placeholder="プレイヤー名"
        maxlength="20"
    >

    <button id="saveNameBtn">
        保存
    </button>

</section>

<section class="status">
    <div id="progress">
        収集率 0 / 0
    </div>

    <div id="remaining">
        ガチャ可能
    </div>
</section>
    
    <button id="gachaBtn">
        ガチャを引く
    </button>

    <div id="animationArea">

    </div>

    <section id="topSongsArea">

    <h2>よく引いている曲 TOP10</h2>

    <div id="topSongs">

    </div>

    <br><br>

    <h2>完成アルバム</h2>

        <br>

<div id="titleList"></div>

<br>

<h2>全曲コンプリート記録</h2>

        <br>
        
<div id="completeRecord">

未達成

</div>

</section>
    
<section class="gacha-area">
    
<section class="collection">

    <h2>図鑑</h2>

    <div class="collection-controls">

        <button id="showAllBtn">
            全表示
        </button>

        <button id="showOwnedBtn">
            所持のみ
        </button>

        <button id="showMissingBtn">
            未取得のみ
        </button>

    </div>

    <div id="collectionGrid">

    </div>

</section>

</div>

<div id="detailModal" class="modal hidden">

<div class="modal-content">

    <span id="closeModal">
        ×
    </span>

    <h2 id="detailTitle"></h2>

    <div id="detailBody"></div>

</div>

</div>

<div id="titleUnlock" class="title-unlock hidden">

  <div class="title-unlock-inner">

    <div class="title-label">
      ALBUM COMPLETE
    </div>

    <div id="titleUnlockName">
      エルマ 完成
    </div>

  </div>

</div>

<div id="completePopup" class="complete-popup hidden">

  <div class="complete-popup-inner">

    <div class="complete-crown">
      👑全曲コンプリート👑
    </div>

    <div id="completeInfo"></div>

    <div class="complete-note">
      （2回タップで閉じる）
    </div>

  </div>

</div>

<script src="script.js"></script>
    
</body>
</html>
