<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヨルシカ図鑑ガチャ</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111111">

</head>
<body>

<div class="container">

```
<header>
    <h1>ヨルシカ図鑑ガチャ</h1>
    <p class="subtitle">
        毎日10連。全曲同確率。
    </p>
</header>

<section class="status">
    <div id="progress">
        収集率 0 / 0
    </div>

    <div id="remaining">
        ガチャ可能
    </div>
</section>

<section class="gacha-area">

    <button id="gachaBtn">
        今日の10連を引く
    </button>

    <div id="animationArea">

    </div>

</section>

<section class="collection">

    <h2>図鑑</h2>

    <div class="collection-controls">

        <button id="showAllBtn">
            全表示
        </button>

        <button id="showOwnedBtn">
            所持のみ
        </button>

        <button id="showMissingBtn">
            未取得のみ
        </button>

    </div>

    <div id="collectionGrid">

    </div>

</section>
```

</div>

<div id="detailModal" class="modal hidden">

```
<div class="modal-content">

    <span id="closeModal">
        ×
    </span>

    <h2 id="detailTitle"></h2>

    <div id="detailBody"></div>

</div>
```

</div>

<script src="script.js"></script>

</body>
</html>
